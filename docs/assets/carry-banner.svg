<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="720" viewBox="0 0 1600 720" role="img" aria-labelledby="title desc">
  <title id="title">Carry project sync banner</title>
  <desc id="desc">Carry moves project folders and shared agent memory between trusted Windows devices with conflict handling and recovery checkpoints.</desc>

  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111419"/>
      <stop offset="0.58" stop-color="#171b22"/>
      <stop offset="1" stop-color="#101319"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#75a2f5"/>
      <stop offset="1" stop-color="#2c66d6"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#242932"/>
      <stop offset="1" stop-color="#1d2128"/>
    </linearGradient>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M42 0H0V42" fill="none" stroke="#2c66d6" stroke-opacity="0.075"/>
    </pattern>
    <filter id="blue-glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#000" flood-opacity="0.45"/>
    </filter>
    <clipPath id="window-clip"><rect x="640" y="58" width="890" height="604" rx="18"/></clipPath>
  </defs>

  <rect width="1600" height="720" fill="url(#background)"/>
  <rect width="1600" height="720" fill="url(#grid)"/>
  <rect x="0" y="0" width="340" height="5" fill="url(#accent)"/>
  <circle cx="1510" cy="72" r="2.5" fill="#75a2f5"/>
  <circle cx="1458" cy="103" r="2" fill="#2c66d6"/>
  <circle cx="1550" cy="142" r="2" fill="#75a2f5"/>
  <path d="M1390 110 1458 103 1510 72 1550 142 1486 168 1422 144Z" fill="none" stroke="#2c66d6" stroke-opacity="0.38"/>

  <!-- Brand -->
  <g transform="translate(76 48) scale(.14)">
    <rect x="24" y="24" width="464" height="464" rx="104" fill="#20242b" stroke="#363a42" stroke-width="8"/>
    <path fill="#2c66d6" d="M378 114H236C155 114 90 178 90 256s65 142 146 142h142c20 0 36-16 36-36v-36c0-20-16-36-36-36h-32l-44 44h-64c-45 0-82-35-82-78s37-78 82-78h64l44 44h32c20 0 36-16 36-36v-36c0-20-16-36-36-36Z"/>
    <rect x="316" y="228" width="62" height="62" rx="16" fill="#f5f6f8"/>
  </g>
  <text x="166" y="86" fill="#a8aeb8" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="600" letter-spacing="3">OPEN SOURCE  /  WINDOWS  /  LOCAL FIRST</text>

  <text x="76" y="218" fill="#f5f6f8" font-family="Segoe UI, Arial, sans-serif" font-size="112" font-weight="800" letter-spacing="-4">CARRY</text>
  <text x="80" y="278" fill="url(#accent)" font-family="Segoe UI, Arial, sans-serif" font-size="52" font-weight="750" letter-spacing="1">PROJECT SYNC</text>
  <rect x="80" y="306" width="180" height="4" rx="2" fill="#2c66d6"/>
  <text x="80" y="356" fill="#f0f2f5" font-family="Segoe UI, Arial, sans-serif" font-size="25" font-weight="600">Your project. Your devices. In sync.</text>
  <text x="80" y="394" fill="#a8aeb8" font-family="Segoe UI, Arial, sans-serif" font-size="18">Move work between trusted computers without</text>
  <text x="80" y="422" fill="#a8aeb8" font-family="Segoe UI, Arial, sans-serif" font-size="18">putting the project folder in a cloud drive.</text>

  <!-- Feature strip -->
  <g font-family="Segoe UI, Arial, sans-serif">
    <g transform="translate(80 492)">
      <rect width="118" height="88" rx="10" fill="#191d24" stroke="#363a42"/>
      <path d="M32 35h31m-8-8 8 8-8 8M76 53H45m8-8-8 8 8 8" fill="none" stroke="#75a2f5" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="59" y="76" fill="#a8aeb8" font-size="12" font-weight="700" text-anchor="middle" letter-spacing="1">SYNC</text>
    </g>
    <g transform="translate(212 492)">
      <rect width="118" height="88" rx="10" fill="#191d24" stroke="#363a42"/>
      <circle cx="42" cy="41" r="5" fill="#75a2f5"/><circle cx="76" cy="30" r="5" fill="#75a2f5"/><circle cx="78" cy="54" r="5" fill="#75a2f5"/>
      <path d="m47 39 24-7M47 44l26 9" stroke="#2c66d6" stroke-width="2"/>
      <text x="59" y="76" fill="#a8aeb8" font-size="12" font-weight="700" text-anchor="middle" letter-spacing="1">MEMORY</text>
    </g>
    <g transform="translate(344 492)">
      <rect width="118" height="88" rx="10" fill="#191d24" stroke="#363a42"/>
      <path d="M76 37a19 19 0 1 0-5 18M76 37V24m0 13H63" fill="none" stroke="#75a2f5" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="59" y="76" fill="#a8aeb8" font-size="12" font-weight="700" text-anchor="middle" letter-spacing="1">RECOVER</text>
    </g>
    <g transform="translate(476 492)">
      <rect width="118" height="88" rx="10" fill="#191d24" stroke="#363a42"/>
      <path d="M34 31h21v25H34zM66 31h21v25H66z" fill="none" stroke="#75a2f5" stroke-width="2.5"/>
      <circle cx="45" cy="43" r="3" fill="#e2b45d"/><circle cx="77" cy="43" r="3" fill="#71c99b"/>
      <text x="59" y="76" fill="#a8aeb8" font-size="12" font-weight="700" text-anchor="middle" letter-spacing="1">CONFLICTS</text>
    </g>
  </g>
  <text x="80" y="628" fill="#707681" font-family="Consolas, monospace" font-size="14">carry  //  private project transfer + shared agent memory</text>

  <!-- Product window -->
  <g filter="url(#shadow)">
    <rect x="640" y="58" width="890" height="604" rx="18" fill="#171a20" stroke="#464b55" stroke-width="2"/>
    <rect x="641" y="59" width="888" height="602" rx="17" fill="none" stroke="#2c66d6" stroke-opacity="0.35"/>
  </g>
  <g clip-path="url(#window-clip)" font-family="Segoe UI, Arial, sans-serif">
    <!-- Title bar -->
    <rect x="640" y="58" width="890" height="62" fill="#20242b"/>
    <g transform="translate(660 73) scale(.07)">
      <rect x="24" y="24" width="464" height="464" rx="104" fill="#20242b"/>
      <path fill="#2c66d6" d="M378 114H236C155 114 90 178 90 256s65 142 146 142h142c20 0 36-16 36-36v-36c0-20-16-36-36-36h-32l-44 44h-64c-45 0-82-35-82-78s37-78 82-78h64l44 44h32c20 0 36-16 36-36v-36c0-20-16-36-36-36Z"/>
      <rect x="316" y="228" width="62" height="62" rx="16" fill="#f5f6f8"/>
    </g>
    <text x="706" y="97" fill="#f0f2f5" font-size="18" font-weight="700">Carry</text>
    <rect x="804" y="72" width="300" height="36" rx="6" fill="#292d34" stroke="#363a42"/>
    <text x="822" y="88" fill="#f0f2f5" font-size="12" font-weight="600">portfolio-project</text>
    <text x="822" y="101" fill="#959ca7" font-family="Consolas, monospace" font-size="9">C:\Projects\portfolio-project</text>
    <circle cx="1312" cy="90" r="5" fill="#71c99b"/>
    <text x="1326" y="96" fill="#a8aeb8" font-size="13">Local and encrypted</text>
    <circle cx="1488" cy="90" r="4" fill="#707681"/>

    <!-- Sidebar -->
    <rect x="640" y="120" width="178" height="542" fill="#1d2025"/>
    <rect x="654" y="142" width="150" height="42" rx="6" fill="#263b62"/>
    <circle cx="677" cy="163" r="8" fill="none" stroke="#75a2f5" stroke-width="2"/><path d="m671 163 5 5 9-11" fill="none" stroke="#75a2f5" stroke-width="2"/>
    <text x="697" y="169" fill="#f0f2f5" font-size="14" font-weight="600">Overview</text>
    <g fill="#a8aeb8" font-size="14">
      <text x="676" y="218">Activity</text>
      <text x="676" y="264">Checkpoints</text>
      <text x="676" y="310">Conflicts</text>
      <text x="676" y="356">Devices</text>
    </g>
    <g fill="none" stroke="#707681" stroke-width="1.7">
      <path d="M660 209h8v8h-8zM664 204v5M664 217v5"/>
      <circle cx="664" cy="255" r="7"/><path d="M664 248v7l4 3"/>
      <path d="m658 300 6-6 6 6-6 6Z"/>
      <rect x="657" y="344" width="14" height="10" rx="2"/>
    </g>
    <text x="660" y="621" fill="#707681" font-size="10">THIS DEVICE</text>
    <text x="660" y="642" fill="#a8aeb8" font-size="13" font-weight="600">Studio PC</text>

    <!-- Workspace -->
    <rect x="818" y="120" width="712" height="542" fill="#16181c"/>
    <text x="850" y="166" fill="#f0f2f5" font-size="27" font-weight="700">Overview</text>
    <text x="850" y="192" fill="#959ca7" font-size="14">Your folder, devices, and recent sync activity.</text>
    <rect x="1362" y="145" width="132" height="42" rx="6" fill="#2c66d6"/>
    <path d="M1384 166h15m-5-5 5 5-5 5" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
    <text x="1410" y="171" fill="#fff" font-size="14" font-weight="700">Sync now</text>

    <!-- Main sync card -->
    <rect x="850" y="220" width="642" height="246" rx="10" fill="url(#panel)" stroke="#363a42"/>
    <circle cx="879" cy="250" r="6" fill="#71c99b"/>
    <text x="895" y="256" fill="#f0f2f5" font-size="17" font-weight="700">Ready to sync</text>
    <text x="895" y="278" fill="#959ca7" font-size="12">Both trusted devices are connected.</text>

    <g>
      <rect x="902" y="316" width="176" height="104" rx="8" fill="#292d34" stroke="#464b55"/>
      <rect x="930" y="338" width="58" height="38" rx="4" fill="#20242b" stroke="#75a2f5"/>
      <path d="M946 365v9m26-9v9m-34 0h42" stroke="#75a2f5" stroke-width="2"/>
      <text x="1007" y="353" fill="#f0f2f5" font-size="14" font-weight="700">Studio PC</text>
      <text x="1007" y="375" fill="#71c99b" font-size="11">Ready</text>
      <text x="990" y="405" fill="#959ca7" font-size="11" text-anchor="middle">This device</text>

      <path d="M1099 350h124" stroke="#2c66d6" stroke-width="4" stroke-linecap="round"/>
      <path d="m1214 342 12 8-12 8M1108 379l-12 8 12 8" fill="none" stroke="#75a2f5" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M1099 387h124" stroke="#75a2f5" stroke-width="2" stroke-linecap="round"/>
      <circle cx="1161" cy="368" r="18" fill="#253754" stroke="#2c66d6"/>
      <text x="1161" y="373" fill="#75a2f5" font-size="14" font-weight="700" text-anchor="middle">C</text>

      <rect x="1244" y="316" width="176" height="104" rx="8" fill="#292d34" stroke="#464b55"/>
      <rect x="1272" y="338" width="58" height="38" rx="4" fill="#20242b" stroke="#75a2f5"/>
      <path d="M1265 381h72" stroke="#75a2f5" stroke-width="2"/>
      <text x="1349" y="353" fill="#f0f2f5" font-size="14" font-weight="700">Laptop</text>
      <text x="1349" y="375" fill="#71c99b" font-size="11">Ready</text>
      <text x="1332" y="405" fill="#959ca7" font-size="11" text-anchor="middle">Trusted device</text>
    </g>

    <!-- Status row -->
    <rect x="850" y="490" width="198" height="116" rx="9" fill="#23262c" stroke="#363a42"/>
    <text x="871" y="518" fill="#959ca7" font-size="11" font-weight="700" letter-spacing="1">SYNC MODE</text>
    <text x="871" y="549" fill="#f0f2f5" font-size="17" font-weight="700">Smart sync</text>
    <text x="871" y="576" fill="#a8aeb8" font-size="12">Keeps both edits when</text>
    <text x="871" y="593" fill="#a8aeb8" font-size="12">a conflict needs you.</text>

    <rect x="1063" y="490" width="198" height="116" rx="9" fill="#23262c" stroke="#363a42"/>
    <text x="1084" y="518" fill="#959ca7" font-size="11" font-weight="700" letter-spacing="1">RECOVERY</text>
    <text x="1084" y="549" fill="#f0f2f5" font-size="17" font-weight="700">Checkpoint ready</text>
    <path d="M1086 578h150" stroke="#363a42" stroke-width="5" stroke-linecap="round"/>
    <path d="M1086 578h116" stroke="#71c99b" stroke-width="5" stroke-linecap="round"/>
    <circle cx="1202" cy="578" r="6" fill="#71c99b"/>

    <rect x="1276" y="490" width="216" height="116" rx="9" fill="#23262c" stroke="#363a42"/>
    <text x="1297" y="518" fill="#959ca7" font-size="11" font-weight="700" letter-spacing="1">LAST SYNC</text>
    <text x="1297" y="549" fill="#f0f2f5" font-size="17" font-weight="700">Complete on both</text>
    <circle cx="1303" cy="578" r="5" fill="#71c99b"/>
    <text x="1317" y="583" fill="#a8aeb8" font-size="12">Baseline saved safely</text>
  </g>
</svg>
