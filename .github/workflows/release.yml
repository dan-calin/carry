name: Build Windows release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Verify and build
    runs-on: windows-latest
    timeout-minutes: 60
    permissions:
      contents: read

    steps:
      - name: Check out source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v6.0.2

      - name: Use Node.js 24.18.0
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.1.0
        with:
          node-version: 24.18.0
          cache: npm

      - name: Install pinned Rust toolchain
        shell: pwsh
        run: |
          rustup toolchain install 1.97.1 --profile minimal --component rustfmt
          rustup default 1.97.1
          rustc --version
          cargo --version

      - name: Verify release tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $version = (Get-Content package.json -Raw | ConvertFrom-Json).version
          if ("v$version" -ne "${{ github.ref_name }}") {
            throw "Tag ${{ github.ref_name }} does not match package version v$version"
          }

      - name: Install and audit dependencies
        shell: pwsh
        run: |
          npm ci --ignore-scripts
          if ($LASTEXITCODE -ne 0) { throw "npm ci failed" }
          node scripts/prepare-native.js
          if ($LASTEXITCODE -ne 0) { throw "Pinned native dependency verification failed" }
          npm audit
          if ($LASTEXITCODE -ne 0) { throw "Dependency audit failed" }

      - name: Run JavaScript regression suite
        run: npm run test:all

      - name: Verify Rust formatting and tests
        shell: pwsh
        run: |
          cargo fmt --manifest-path src-tauri/Cargo.toml -- --check
          if ($LASTEXITCODE -ne 0) { throw "Rust formatting check failed" }
          cargo test --locked --manifest-path src-tauri/Cargo.toml
          if ($LASTEXITCODE -ne 0) { throw "Tauri shell tests failed" }

      - name: Build installer and portable package
        shell: pwsh
        run: ./scripts/build-windows.ps1

      - name: Upload workflow artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: carry-windows-${{ github.sha }}
          path: dist/*
          if-no-files-found: error
          retention-days: 14

  publish:
    name: Publish preview release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Download verified artifacts
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5.0.0
        with:
          name: carry-windows-${{ github.sha }}
          path: dist

      - name: Create immutable preview release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ github.ref_name }}" >/dev/null 2>&1; then
            echo "Release ${{ github.ref_name }} already exists; refusing to replace published files." >&2
            exit 1
          fi
          gh release create "${{ github.ref_name }}" dist/* \
            --repo "${{ github.repository }}" \
            --title "Carry ${{ github.ref_name }}" \
            --generate-notes \
            --prerelease
